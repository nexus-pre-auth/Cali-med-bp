services:
  hcai-api:
    build: .
    image: hcai-compliance-engine:latest
    container_name: hcai-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - API_KEYS=${API_KEYS:-}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - NOTIFY_MIN_SEVERITY=${NOTIFY_MIN_SEVERITY:-Critical}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      - chroma_data:/app/chroma_db
      - ./output:/app/output
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: index knowledge base on first run
  hcai-index:
    build: .
    image: hcai-compliance-engine:latest
    container_name: hcai-index
    environment:
      - LOG_LEVEL=INFO
    volumes:
      - chroma_data:/app/chroma_db
    command: ["index-kb"]
    profiles:
      - setup

volumes:
  chroma_data:
    driver: local
