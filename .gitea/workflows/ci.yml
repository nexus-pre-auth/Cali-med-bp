name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Flake8
        # E501 long lines, W503 line-break-before-operator — both acceptable here
        run: |
          flake8 src/ main.py config.py \
            --max-line-length=120 \
            --ignore=E501,W503,E402

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # Install cffi before the rest of the deps so the compiled C backend
      # is available when cryptography (pulled in by pdfminer/pdfplumber) is
      # installed.  Without this, the Rust pyo3 extension can panic with a
      # BaseException (not ImportError) that crashes the test runner.
      - name: Pre-install cffi
        run: pip install "cffi>=1.16.0"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          # Tests use template fallback mode — no API key needed
          ANTHROPIC_API_KEY: ""
